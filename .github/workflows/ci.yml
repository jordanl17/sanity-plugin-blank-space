name: CI
run-name: 'CI — ${{ github.event.pull_request.title || github.event.head_commit.message }}'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

  compatibility:
    name: Sanity ${{ matrix.sanity-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanity-version: ['3.x', '4.x']
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Pin sanity to ${{ matrix.sanity-version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.pnpm.overrides = {...(pkg.pnpm.overrides || {}), sanity: '${{ matrix.sanity-version }}'};
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Remove lockfile for clean dependency resolution
        run: rm pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test sanity plugin
        run: pnpm vitest run

      - name: Type check
        run: pnpm type-check
